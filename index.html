<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Victor's Kazik 🌶️</title>
<style>
:root{
  --bg:#070810;--text:#e9ecff;--muted:#aab1dd;--gold:#ffd36b;
  --neon:#7c5cff;--green:#2dff88;--red:#ff3b5c;--line:rgba(255,255,255,.10);
  --shadow: 0 18px 70px rgba(0,0,0,.55);
}
*{box-sizing:border-box}
body{
  margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:
    radial-gradient(900px 500px at 20% 10%, rgba(124,92,255,.28), transparent 60%),
    radial-gradient(900px 600px at 80% 20%, rgba(255,211,107,.18), transparent 55%),
    radial-gradient(900px 700px at 50% 95%, rgba(45,255,136,.12), transparent 60%),
    radial-gradient(800px 500px at 10% 80%, rgba(255,59,92,.10), transparent 60%),
    var(--bg);
  color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;
}
@keyframes floaty{0%{transform:translateY(0) translateX(0);opacity:.15}50%{transform:translateY(-10px) translateX(6px);opacity:.25}100%{transform:translateY(0) translateX(0);opacity:.15}}
.sparkles{
  position:fixed;inset:0;pointer-events:none;opacity:.35;
  background-image:
    radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,.9), transparent 55%),
    radial-gradient(2px 2px at 70% 30%, rgba(255,255,255,.8), transparent 55%),
    radial-gradient(2px 2px at 30% 70%, rgba(255,255,255,.75), transparent 55%),
    radial-gradient(2px 2px at 90% 80%, rgba(255,255,255,.8), transparent 55%),
    radial-gradient(2px 2px at 55% 55%, rgba(255,255,255,.7), transparent 55%);
  animation: floaty 4.5s ease-in-out infinite;
}

.phone{width:min(420px,100%);aspect-ratio:9/16;border-radius:38px;padding:14px;
  background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
  box-shadow: var(--shadow);border:1px solid rgba(255,255,255,.14);position:relative;
}
.screen{height:100%;border-radius:28px;overflow:hidden;
  background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(0,0,0,.30));
  border:1px solid rgba(255,255,255,.10);display:flex;flex-direction:column;position:relative;
}
header{padding:14px;border-bottom:1px solid var(--line);
  background:linear-gradient(90deg,rgba(124,92,255,.20),rgba(255,211,107,.12),rgba(45,255,136,.08),rgba(255,59,92,.08));
  display:flex;justify-content:space-between;align-items:center;gap:10px;
}
.brand{display:flex;gap:10px;align-items:center;font-weight:900;letter-spacing:.2px}
.dot{width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#fff,rgba(255,255,255,.15)),
             radial-gradient(circle at 50% 50%,var(--neon),rgba(124,92,255,.1));
  box-shadow:0 0 18px rgba(124,92,255,.7);
}
.topright{display:flex;align-items:center;gap:8px}
.pill{color:var(--muted);font-size:12px;border:1px solid var(--line);padding:6px 10px;border-radius:999px;background:rgba(0,0,0,.18)}
.iconbtn{border:1px solid var(--line);background:rgba(0,0,0,.18);color:var(--text);
  border-radius:12px;padding:6px 10px;font-size:12px;cursor:pointer}
.iconbtn:active{transform:translateY(1px)}
.content{padding:14px;display:flex;flex-direction:column;gap:12px;flex:1}
.panel{border:1px solid var(--line);border-radius:18px;padding:14px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(0,0,0,.25))}
.balance{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.balance .label{color:var(--muted);font-size:12px}
.balance .value{font-weight:900;font-size:22px;color:var(--gold);letter-spacing:.3px}
.reels{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.reel{height:140px;border-radius:16px;border:1px solid rgba(255,255,255,.12);
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(0,0,0,.35));
  position:relative;overflow:hidden;box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
}
.reel::before{content:"";position:absolute;inset:0;background: radial-gradient(120px 60px at 50% 25%, rgba(255,211,107,.14), transparent 60%);pointer-events:none}
.window{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:calc(100% - 20px);height:56px;border-radius:12px;border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.25);box-shadow: inset 0 0 22px rgba(0,0,0,.35);pointer-events:none;
}
.strip{position:absolute;left:0;top:0;width:100%;will-change:transform}
.item{height:56px;display:flex;align-items:center;justify-content:center;user-select:none}
.item img{height:48px;width:48px;border-radius:10px;object-fit:cover;box-shadow:0 10px 18px rgba(0,0,0,.35)}
.emoji{font-size:28px;filter: drop-shadow(0 10px 16px rgba(0,0,0,.35));}
.status{min-height:56px;border:1px solid var(--line);border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:8px 10px}
.status.error{color:#fff;border-color: rgba(255,59,92,.35);background:linear-gradient(180deg,rgba(255,59,92,.20),rgba(0,0,0,.20))}
.status.ok{color:#08110d;border-color: rgba(45,255,136,.35);background:linear-gradient(180deg,rgba(45,255,136,.55),rgba(0,0,0,.08))}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:auto}
@keyframes pulse{0%,100%{transform:translateY(0) scale(1);filter:brightness(1)}50%{transform:translateY(-1px) scale(1.02);filter:brightness(1.18)}}
button.main{appearance:none;border-radius:16px;padding:14px;font-weight:900;letter-spacing:.7px;border:1px solid rgba(255,255,255,.14);cursor:pointer;box-shadow: 0 10px 30px rgba(0,0,0,.40)}
button.main.play{animation:pulse 1.6s ease-in-out infinite}
button.main:active{transform:translateY(1px) scale(.99)}
button.main:disabled{opacity:.55;cursor:not-allowed;filter:saturate(.7);animation:none}
.play{background:linear-gradient(180deg,var(--green),rgba(45,255,136,.65));color:#0b0d14}
.withdraw{background:linear-gradient(180deg,var(--red),rgba(255,59,92,.70));color:#fff}
.smallnote{margin-top:8px;color:rgba(255,255,255,.45);font-size:12px;line-height:1.2;text-align:center}

@keyframes winFlash{0%,100%{filter:none}50%{filter: drop-shadow(0 0 18px rgba(45,255,136,.55)) brightness(1.25)}}
@keyframes shake{0%{transform:translateX(0)}15%{transform:translateX(-2px)}30%{transform:translateX(3px)}45%{transform:translateX(-2px)}60%{transform:translateX(2px)}100%{transform:translateX(0)}}
.winflash .panel{animation: winFlash 0.22s ease-in-out 0s 10}
.shake .panel{animation: shake 0.26s ease-in-out 0s 1}

#confetti{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;display:none}
#confetti.show{display:block}

/* 404 overlay (fictionalized) */
.overlay{position:absolute; inset:0; display:none; background:#e9eefc; align-items:center; justify-content:center; padding:22px}
.overlay.show{display:flex}
.govcard{width:min(520px,100%);background:#fff;border-radius:20px;box-shadow:0 18px 60px rgba(0,0,0,.18);padding:26px 22px 22px;text-align:center}
.parodytag{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.08);color:#0f1e35;font-size:12px;padding:6px 10px;border-radius:999px}
.govlogo{font-weight:900;font-size:44px;letter-spacing:.2px;display:flex;justify-content:center;margin-bottom:8px}
.govlogo .a{color:#1f55ff}
.govlogo .b{color:#ff3b5c}
.lang{display:inline-flex;align-items:center;gap:8px;color:#1b2a44;opacity:.9;font-size:18px;margin:8px 0 18px}
.flag{width:22px;height:22px;border-radius:50%;background: linear-gradient(180deg,#fff 0 33%, #2f6cff 33% 66%, #ff3b5c 66% 100%);border:1px solid rgba(0,0,0,.08)}
.govh{margin:0;font-size:28px;color:#0f1e35;line-height:1.25}
.govp{margin:14px 0 18px;color:#152a44;opacity:.85;line-height:1.35;font-size:16px}
.maxrow{display:flex;align-items:center;justify-content:center;gap:10px;margin:14px 0 10px}
.maxicon{width:34px;height:34px;border-radius:12px;background: radial-gradient(circle at 30% 30%, #7c5cff, #2f6cff);display:grid;place-items:center;color:white;font-weight:900;box-shadow: 0 10px 20px rgba(47,108,255,.25)}
.maxname{font-weight:900;color:#0f1e35;font-size:26px;letter-spacing:.2px}
.bigbtn{display:block;width:100%;background:#1f55ff;color:#fff;border:none;border-radius:14px;padding:16px 14px;font-size:18px;font-weight:800;margin-top:12px;cursor:pointer}
.smalllink{margin-top:14px;font-size:14px;color:#1f55ff;text-decoration:none;display:inline-block}
.smalllink:hover{text-decoration:underline}
</style>
</head>

<div class="sparkles"></div>

<div class="phone">
  <div class="screen" id="screen">
    <canvas id="confetti"></canvas>

    <header>
      <div class="brand"><span class="dot"></span>Victor's Kazik 🌶️</div>
      <div class="topright">
        <span class="pill" id="spinTag">Готово</span>
        <button class="iconbtn" id="soundBtn" title="Звук">🔊</button>
        <button class="iconbtn" id="resetBtn" title="Сбросить баланс">Сброс</button>

    </header>

    <div class="content">
      <div class="panel">
        <div class="balance">
          <div>
            <div class="label">Баланс</div>
            <div class="value" id="bal">42 300 ₽</div>
          </div>
          <div class="label">Ставка: <span id="betLabel">1 000 ₽</span></div>
        </div>

        <div class="reels">
          <div class="reel"><div class="strip"></div><div class="window"></div></div>
          <div class="reel"><div class="strip"></div><div class="window"></div></div>
          <div class="reel"><div class="strip"></div><div class="window"></div></div>
        </div>
</div>

      <div class="status" id="status">Нажмите «Играть»</div>

      <div class="actions">
        <button class="main play" id="play">ИГРАТЬ</button>
        <button class="main withdraw" id="wd">ВЫВЕСТИ</button>
      </div>
    </div>

    <div class="overlay" id="overlay404" aria-hidden="true">
      <div class="govcard">
                <div class="govlogo"><span class="a">гос</span><span class="b">услуги</span></div>
        <div class="lang">Русский <span class="flag" aria-hidden="true"></span></div>

        <div class="maxrow">
          <div class="maxicon">M</div>
          <div class="maxname">MAX</div>
        </div>
        <p class="govp">Получайте коды подтверждения в чат‑мессенджере. Для этого скачайте приложение и зарегистрируйтесь по номеру телефона.</p>
        <button class="bigbtn" id="dlBtn">Скачать MAX</button>
        <a class="smalllink" href="#/" id="backBtn">Вернуться назад</a>
      </div>
    </div>

  </div>
</div>

  // Не даём балансу превысить стартовый депозит (для реквизита/комедии)

  balEl.textContent = fmtRub(balance);
}
setBalance(balance);

let audioCtx = null;
let soundEnabled = true;

function ensureAudio(){
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
}
function beep(freq=440, dur=0.08, type="sine", gain=0.06){
  if (!soundEnabled) return;
  ensureAudio();
  const t0 = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(gain, t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(t0); o.stop(t0+dur+0.02);
}
function noiseBurst(dur=0.12, gain=0.02){
  if (!soundEnabled) return;
  ensureAudio();
  const t0 = audioCtx.currentTime;
  const bufferSize = Math.floor(audioCtx.sampleRate * dur);
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
  const src = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(gain, t0);
  src.buffer = buffer;
  src.connect(g).connect(audioCtx.destination);
  src.start(t0);
}
function coin(){ beep(900, 0.04, "triangle", 0.05); setTimeout(()=>beep(1200, 0.06, "triangle", 0.05), 40); }
function spinTick(){ noiseBurst(0.025, 0.02); beep(240 + Math.random()*70, 0.025, "square", 0.014); }
function winJingle(){ coin(); setTimeout(()=>coin(), 110); setTimeout(()=>beep(660, 0.10, "triangle", 0.06), 200); setTimeout(()=>beep(880, 0.10, "triangle", 0.06), 320); setTimeout(()=>beep(990, 0.12, "triangle", 0.06), 450); }
function jackpotJingle(){ for (let i=0;i<6;i++) setTimeout(()=>coin(), i*80); setTimeout(()=>beep(880, 0.18, "sawtooth", 0.07), 520); setTimeout(()=>beep(1320, 0.20, "sawtooth", 0.07), 700); setTimeout(()=>beep(1760, 0.22, "triangle", 0.07), 920); }
function loseBuzz(){ beep(180, 0.12, "sawtooth", 0.04); setTimeout(()=>beep(140, 0.16, "sawtooth", 0.04), 90); }

soundBtn.addEventListener("click", () => {
  soundEnabled = !soundEnabled;
  soundBtn.textContent = soundEnabled ? "🔊" : "🔇";
  if (soundEnabled) ensureAudio();
});
resetBtn.addEventListener("click", () => {
  setBalance(START_BAL);
  spinCount = 0;
  setStatus("Баланс и счётчик сброшены.", null);
});
function setStatus(msg, mode){
  status.classList.remove("error","ok");
  if (mode) status.classList.add(mode);
  status.textContent = msg;
}

function pickWeighted(arr){
  const total = arr.reduce((s,x)=>s+(x.weight||1),0);
  let r = Math.random()*total;
  for(const x of arr){
    r -= (x.weight||1);
    if (r <= 0) return x;
  }
  return arr[arr.length-1];
}
function makeItem(sym){
  const d = document.createElement("div");
  d.className="item";
  d.dataset.symId = sym.id;
  if(sym.type==="img"){
    const im=document.createElement("img");
    im.src=sym.src;
    d.appendChild(im);
  } else {
    const s = document.createElement("span");
    s.className="emoji";
    s.textContent=sym.val;
    d.appendChild(s);
  }
  return d;
}
let sharedTemplateSyms = null;

function buildSharedTemplate(){
  // build once per spin: identical ordering for all reels
  sharedTemplateSyms = [];
  for(let i=0;i<24;i++){
    sharedTemplateSyms.push(pickWeighted(symbols));
  }
}

function fill(strip){
  if (!sharedTemplateSyms) buildSharedTemplate();
  strip.innerHTML="";
  for (const sym of sharedTemplateSyms){
    strip.appendChild(makeItem(sym));
  }
  strip.style.transform="translateY(0px)";
}
function snapToCenter(strip, index){
  const y = CENTER_OFFSET - (index * ITEM_H);
  strip.style.transform = `translateY(${y}px)`;
}
function getSymbolAtIndex(strip, index){
  const el = strip.children[index];
  if (!el) return null;
  const id = el.dataset.symId;
  return symbols.find(s => s.id === id) || null;
}
sharedTemplateSyms = null;
buildSharedTemplate();
reels.forEach(fill);

function resizeConfetti(){
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const rect = confettiCanvas.getBoundingClientRect();
  confettiCanvas.width = Math.floor(rect.width * dpr);
  confettiCanvas.height = Math.floor(rect.height * dpr);
}
window.addEventListener("resize", resizeConfetti);

function startConfetti(durationMs=1600, intensity=1){
  resizeConfetti();
  const ctx = confettiCanvas.getContext("2d");
  const w = confettiCanvas.width, h = confettiCanvas.height;
  const N = Math.floor(160 * intensity);
  const parts = [];
  for(let i=0;i<N;i++){
    parts.push({
      x: Math.random()*w, y: -Math.random()*h*0.2,
      vx: (Math.random()*2-1) * (w*0.0012),
      vy: (0.9 + Math.random()*2.2) * (h*0.0014),
      r: 2 + Math.random()*5,
      rot: Math.random()*Math.PI*2,
      vr: (Math.random()*2-1)*0.25,
    });
  }
  confettiCanvas.classList.add("show");
  const t0 = performance.now();
  (function frame(t){
    const dt = t - t0;
    ctx.clearRect(0,0,w,h);
    const life = Math.max(0, 1 - dt / durationMs);
    for(const p of parts){
      p.x += p.vx * 16; p.y += p.vy * 16; p.rot += p.vr * 16;
      const hue = ((p.x / w) * 360 + dt*0.04) % 360;
      ctx.save();
      ctx.globalAlpha = life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = `hsl(${hue}, 95%, 60%)`;
      ctx.fillRect(-p.r, -p.r/2, p.r*2.4, p.r*1.2);
      ctx.restore();
    }
    if (dt < durationMs) requestAnimationFrame(frame);
    else { confettiCanvas.classList.remove("show"); ctx.clearRect(0,0,w,h); }
  })(performance.now());
}

function winFlash(){ screen.classList.add("winflash"); setTimeout(()=>screen.classList.remove("winflash"), 2400); }
function shakeOnce(){ screen.classList.add("shake"); setTimeout(()=>screen.classList.remove("shake"), 350); }

function evaluateWin(picks){
  const a=picks[0]?.id, b=picks[1]?.id, c=picks[2]?.id;
  if (!a || !b || !c) return {win:0, label:"Ошибка", kind:"err"};
  if (a===b && b===c){
    const payout = picks[0].payout3 || 0;
    return {win:payout, label:`Комбо 3×: +${fmtRub(payout)}`, kind:"triple"};
  }
  if (a===b || a===c || b===c){
    const payout = Math.round((BET*0.3)/100)*100;
    return {win:payout, label:`Комбо 2×: +${fmtRub(payout)}`, kind:"pair"};
  }
  return {win:0, label:`Неудача: -${fmtRub(BET)}`, kind:"lose"};
}
function forceResult(chosenIdx, forcedIds){
  for (let i=0;i<3;i++){
    const strip = reels[i];
    const idx = chosenIdx[i];
    const sym = symbols.find(s=>s.id===forcedIds[i]) || symbols[0];
    const newItem = makeItem(sym);
    if (strip.children[idx]) strip.replaceChild(newItem, strip.children[idx]);
  }
}
function helpToPair(chosenIdx){
  if (Math.random() > PAIR_HELP_PROB) return false;
  const ids = chosenIdx.map((idx,i)=>getSymbolAtIndex(reels[i], idx)?.id);
  if (ids.some(x=>!x)) return false;
  const target = ids[Math.floor(Math.random()*2)];
  forceResult(chosenIdx, [ids[0], ids[1], target]);
  return true;
}

function breakWin(chosenIdx){
  // Анти‑выигрыш: если случайно выпала пара/тройка — часто «разводим» символы.
  const ids = chosenIdx.map((idx,i)=>getSymbolAtIndex(reels[i], idx)?.id);
  if (ids.some(x=>!x)) return false;
  const pool = symbols.map(s=>s.id);
  let c = ids[2];
  for(let t=0;t<12;t++){
    if (c!==ids[0] && c!==ids[1]) break;
    c = pool[Math.floor(Math.random()*pool.length)];
  }
  // Гарантия: если всё ещё совпадает — берём следующий по списку
  if (c===ids[0] || c===ids[1]){
    const i0 = pool.indexOf(ids[0]);
    c = pool[(i0+1) % pool.length];
  }
  forceResult(chosenIdx, [ids[0], ids[1], c]);
  return true;
}

let spinning=false;
let spinCount=0;

function spin(){
  if (spinning) return;
  if (soundEnabled) ensureAudio();

  if (balance < BET){
    setStatus("Недостаточно средств для прокрута.", "error");
    spinTag.textContent="Ошибка";
    loseBuzz();
    return;
  }

  setBalance(balance - BET);

  spinning=true;
  play.disabled=true; wd.disabled=true;
  setStatus("Крутится…", null);
  spinTag.textContent="Крутится…";

  reels.forEach(fill);

  const start=performance.now();
  const heights=reels.map(r=>r.scrollHeight);
  const speeds=[3.8,4.4,4.0].map(v=>v+Math.random()*1.0);
  let lastTick=0;

  function frame(t){
    const dt=t-start;
    if (dt - lastTick > 105){ spinTick(); lastTick=dt; }

    reels.forEach((r,i)=>{
      const y=(dt*speeds[i])%(heights[i]/2);
      r.style.transform=`translateY(${-y}px)`;
    });

    if (dt < 1450) requestAnimationFrame(frame);
    else {
      spinCount += 1;

      const chosenIdx = [];
      reels.forEach((r)=>{
        const maxIndex = Math.max(0, r.children.length - 1);
        chosenIdx.push(Math.min(Math.floor(6 + Math.random()*10), maxIndex));
      });

      reels.forEach((r,i)=>snapToCenter(r, chosenIdx[i]));

      const isJackpotSpin = (spinCount % JACKPOT_EVERY_N === 0);
      if (isJackpotSpin){
        forceResult(chosenIdx, ["se","se","se"]);
      } else {
        const picks0 = reels.map((r,i)=>getSymbolAtIndex(r, chosenIdx[i]));
        const res0 = evaluateWin(picks0);
        // Делаем игру более «проигрышной»: часто ломаем случайные выигрыши,
        // а «подкрутку» к паре оставляем редкой.
        if (res0.win > 0 && Math.random() < 0.65) breakWin(chosenIdx);
        else if (res0.win === 0) helpToPair(chosenIdx);
      }

      const picks = reels.map((r,i)=>getSymbolAtIndex(r, chosenIdx[i]));
      const res = evaluateWin(picks);

      if (isJackpotSpin){
        const jackpotBonus = 6000;
        setBalance(balance + jackpotBonus);
        setStatus(`ДЖЕКПОТ 🎉 +${fmtRub(jackpotBonus)}`, "ok");
        spinTag.textContent="ДЖЕКПОТ";
        jackpotJingle();
        winFlash();
        startConfetti(2200, 1.8);
      } else if (res.win > 0){
        setBalance(balance + res.win);
        setStatus(res.label, "ok");
        spinTag.textContent="Выигрыш";
        winJingle();
        winFlash();
        startConfetti(1500, res.kind==="triple" ? 1.4 : 1.0);
      } else {
        setStatus(res.label, "error");
        spinTag.textContent="Готово";
        shakeOnce();
        loseBuzz();
      }

      spinning=false;
      play.disabled=false; wd.disabled=false;
    }
  }
  requestAnimationFrame(frame);
}

play.onclick=spin;

function show404(show){
  overlay.classList.toggle("show", show);
  overlay.setAttribute("aria-hidden", show ? "false" : "true");
}
function route(){
  const h = (location.hash || "#/").toLowerCase();
  show404(h.includes("withdraw"));
}
window.addEventListener("hashchange", route);
route();

wd.onclick=()=>{
  if (soundEnabled) ensureAudio();
  beep(420, 0.08, "square", 0.03);
  location.hash = "#/withdraw";
};

dlBtn.onclick=()=>{
  if (soundEnabled) ensureAudio();
  coin(); setTimeout(()=>coin(), 90);
};
</script>
